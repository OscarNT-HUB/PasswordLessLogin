<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#7C4DFF">
  <meta name="description" content="Auto Password Generator - Login sin contraseñas">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='32' fill='%237C4DFF'/%3E%3Ctext x='96' y='130' text-anchor='middle' font-size='120' fill='white' font-family='Arial'%3EA%3C/text%3E%3C/svg%3E">
  <title>Auto Password Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="screen-register" class="screen active">
      <div class="header">
        <div class="header-bg"></div>
        <div class="header-content">
          <div class="icon-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <h1>Crear Cuenta</h1>
          <p>Regístrate para obtener acceso</p>
        </div>
      </div>
      <div class="card">
        <form id="register-form">
          <div class="input-group">
            <label for="reg-name">
              <svg viewBox="0 0 24 24" fill="none" stroke="#7C4DFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              Nombre
            </label>
            <input type="text" id="reg-name" placeholder="Tu nombre completo" required>
          </div>
          <div class="input-group">
            <label for="reg-dob">
              <svg viewBox="0 0 24 24" fill="none" stroke="#7C4DFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              Fecha de Nacimiento
            </label>
            <input type="date" id="reg-dob" required>
          </div>
          <div class="input-group">
            <label for="reg-email">
              <svg viewBox="0 0 24 24" fill="none" stroke="#7C4DFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              Correo Electrónico
            </label>
            <input type="email" id="reg-email" placeholder="correo@ejemplo.com" required>
          </div>
          <button type="submit" class="btn btn-primary">
            <span class="btn-text">REGISTRARSE</span>
            <span class="btn-loader" style="display:none"></span>
          </button>
        </form>
        <p class="switch-text">
          ¿Ya tienes cuenta?
          <a href="#" onclick="showScreen('login')">Inicia Sesión</a>
        </p>
      </div>
    </div>

    <div id="screen-login" class="screen">
      <div class="header">
        <div class="header-bg"></div>
        <div class="header-content">
          <div class="icon-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
          <h1>Iniciar Sesión</h1>
          <p>Ingresa tus credenciales</p>
        </div>
      </div>
      <div class="card">
        <form id="login-form">
          <div class="input-group">
            <label for="login-email">
              <svg viewBox="0 0 24 24" fill="none" stroke="#7C4DFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              Correo Electrónico
            </label>
            <input type="email" id="login-email" placeholder="correo@ejemplo.com" required>
          </div>
          <div class="input-group">
            <label for="login-password">
              <svg viewBox="0 0 24 24" fill="none" stroke="#7C4DFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              Contraseña
            </label>
            <input type="password" id="login-password" placeholder="Tu contraseña" required>
          </div>
          <button type="submit" class="btn btn-primary">
            <span class="btn-text">INICIAR SESIÓN</span>
            <span class="btn-loader" style="display:none"></span>
          </button>
        </form>
        <p class="switch-text">
          ¿No tienes cuenta?
          <a href="#" onclick="showScreen('register')">Regístrate</a>
        </p>
      </div>
    </div>

    <div id="screen-home" class="screen">
      <div class="header">
        <div class="header-bg"></div>
        <div class="header-content">
          <div class="icon-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <h1 id="home-name">Bienvenido</h1>
          <p id="home-email"></p>
        </div>
      </div>
      <div class="card">
        <div class="profile-section">
          <div class="avatar" id="home-avatar">U</div>
          <div class="profile-details">
            <p><strong>Nombre:</strong> <span id="home-name-detail"></span></p>
            <p><strong>Email:</strong> <span id="home-email-detail"></span></p>
            <p><strong>Fecha de Nacimiento:</strong> <span id="home-dob-detail"></span></p>
          </div>
        </div>
        <button onclick="logout()" class="btn btn-secondary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          CERRAR SESIÓN
        </button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
